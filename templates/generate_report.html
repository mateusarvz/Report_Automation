<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gerar Relatório - Report Psicologia</title>
    <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar">
            <div class="brand">Report Psicologia</div>
            <nav>
                <a href="/generate-report" class="{{ 'active' if current_path == '/generate-report' else '' }}">Gerar Relatório</a>
                <a href="/register-patient" class="{{ 'active' if current_path == '/register-patient' else '' }}">Cadastrar Paciente</a>
                <a href="/account" class="{{ 'active' if current_path == '/account' else '' }}">Dados da conta</a>
                <a href="/patients" class="{{ 'active' if current_path == '/patients' else '' }}">Dados dos Pacientes</a>
            </nav>
        </aside>
        <main class="content">
            <header class="topbar">
                <div>Gerar Relatório</div>
                <a class="logout" href="/logout">Sair</a>
            </header>

            <section class="section">
                <h2>Gerar Relatório</h2>
                <p>Selecione paciente abaixo. Relatórios serão gerados em momento futuro.</p>
                <div class="form-card">
                    <label for="report-patient">Paciente</label>
                    <select id="report-patient">
                        <option>Carregando pacientes...</option>
                    </select>
                    <p class="help-text">Apenas pacientes vinculados à sua conta.</p>
                    <div style="margin-top:16px">
                        <button class="button" id="generate-btn" disabled>Gerar (placeholder)</button>
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script>
        async function loadPatients() {
            const select = document.getElementById('report-patient');
            try {
                const res = await fetch('/api/patients');
                if (!res.ok) throw new Error('failed');
                const patients = await res.json();
                select.innerHTML = '';
                if (!Array.isArray(patients) || patients.length === 0) {
                    select.disabled = true;
                    select.innerHTML = '<option>Nenhum paciente</option>';
                    return;
                }
                patients.forEach(p => {
                    const opt = document.createElement('option');
                    opt.value = p.id;
                    opt.textContent = p.full_name || 'Paciente';
                    select.appendChild(opt);
                });
                select.disabled = false;
                document.getElementById('generate-btn').disabled = false;
            } catch (e) {
                select.innerHTML = '<option>Erro ao carregar</option>';
                select.disabled = true;
                console.error(e);
            }
        }

        document.getElementById('generate-btn').addEventListener('click', () => {
            alert('Placeholder: geração de relatório implementada futuramente.');
        });

        loadPatients();
    </script>
</body>
</html>
