<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gerar Relatório - Report Psicologia</title>
    <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar">
            <div>
                <div class="brand-row">
                    <img class="brand-logo" src="/static/assets/logos/LOGO_TESTE.png" alt="Logo CogniReports" />
                    <div class="brand"><span class="brand-cogni">Cogni</span><span class="brand-reports">Reports</span></div>
                </div>
                <nav>
                    <a href="/generate-report" class="{{ 'active' if current_path == '/generate-report' else '' }}">Nova Avaliação</a>
                    <a href="/register-patient" class="{{ 'active' if current_path == '/register-patient' else '' }}">Novo Paciente</a>
                    <a href="/account" class="{{ 'active' if current_path == '/account' else '' }}">Perfil</a>
                    <a href="/patients" class="{{ 'active' if current_path == '/patients' else '' }}">Pacientes</a>
                </nav>
            </div>
        </aside>
        <main class="content">
            <div class="topbar">
                <section class="page-header">
                    <img class="page-icon-image" src="/static/assets/icons/nova-avaliacao.png" alt="Ícone de Nova Avaliação" />
                    <div>
                        <h1>Nova Avaliação</h1>
                    </div>
                </section>
                <div class="user-menu" id="user-menu">
                    <button class="user-menu-button" type="button" id="user-menu-toggle" aria-expanded="false">
                        <img class="user-menu-icon" src="/static/assets/icons/usuario_user.png" alt="Ícone de usuário" />
                        <div class="user-menu-text">
                            <span class="user-menu-name">{{ user_display_name or user.full_name or user.email or 'Conta logada' }}</span>
                            {% set subtitle = '' %}
                            {% if user.profession == 'Psicólogo(a)' and user.gender == 'Masculino' %}
                                {% set subtitle = 'Psicólogo' %}
                            {% elif user.profession == 'Psicólogo(a)' and user.gender == 'Feminino' %}
                                {% set subtitle = 'Psicóloga' %}
                            {% elif user.profession == 'Neuropsicólogo(a)' and user.gender == 'Masculino' %}
                                {% set subtitle = 'Neuropsicólogo' %}
                            {% elif user.profession == 'Neuropsicólogo(a)' and user.gender == 'Feminino' %}
                                {% set subtitle = 'Neuropsicóloga' %}
                            {% endif %}
                            {% if subtitle %}<span class="user-menu-subtitle">{{ subtitle }}</span>{% endif %}
                        </div>
                        <span class="user-menu-caret">▾</span>
                    </button>
                    <div class="user-menu-dropdown" id="user-menu-dropdown">
                        <a href="/logout">Sair</a>
                    </div>
                </div>
            </div>

            <section class="section" style="padding-top: 16px;">
                <div class="form-card" id="report-selection-card">
                    <label for="report-patient">Paciente</label>
                    <select id="report-patient">
                        <option>Carregando pacientes...</option>
                    </select>
                    <label for="report-type">Tipo de relatório</label>
                    <select id="report-type">
                        <option>Carregando tipos...</option>
                    </select>
                    <div>
                        <button class="button" id="generate-btn" disabled>Carregar Relatório</button>
                    </div>
                </div>
            </section>
            <div id="report-input-container"></div>
            <div id="report-results-container"></div>
        </main>
    </div>
    <script>
        async function loadPatients() {
            const select = document.getElementById('report-patient');
            try {
                const res = await fetch('/api/patients');
                if (!res.ok) throw new Error('failed');
                const patients = await res.json();
                select.innerHTML = '';
                if (!Array.isArray(patients) || patients.length === 0) {
                    select.disabled = true;
                    select.innerHTML = '<option>Nenhum paciente</option>';
                    return;
                }
                patients.forEach(p => {
                    const opt = document.createElement('option');
                    opt.value = p.id;
                    opt.textContent = p.age !== '' && p.age !== null && p.age !== undefined
                        ? `${p.full_name || 'Paciente'} - ${p.age} anos`
                        : (p.full_name || 'Paciente');
                    select.appendChild(opt);
                });
                select.disabled = false;
                updateGenerateButtonState();
            } catch (e) {
                select.innerHTML = '<option>Erro ao carregar</option>';
                select.disabled = true;
                console.error(e);
            }
        }

        async function loadReportTypes() {
            const select = document.getElementById('report-type');
            try {
                const res = await fetch('/api/report-types');
                if (!res.ok) throw new Error('failed');
                const types = await res.json();
                select.innerHTML = '';
                if (!Array.isArray(types) || types.length === 0) {
                    select.disabled = true;
                    select.innerHTML = '<option>Nenhum relatório disponível</option>';
                    return;
                }
                types.forEach(type => {
                    const opt = document.createElement('option');
                    opt.value = type;
                    opt.textContent = type;
                    select.appendChild(opt);
                });
                select.disabled = false;
                updateGenerateButtonState();
            } catch (e) {
                select.innerHTML = '<option>Erro ao carregar</option>';
                select.disabled = true;
                console.error(e);
            }
        }

        function clearReportContainers() {
            const inputContainer = document.getElementById('report-input-container');
            const resultsContainer = document.getElementById('report-results-container');
            if (inputContainer) inputContainer.innerHTML = '';
            if (resultsContainer) resultsContainer.innerHTML = '';
        }

        function getReportInputRules(reportName) {
            if (reportName === 'Teste A e B') {
                return {
                    resultado_parte_a: { min: 7, max: 24 },
                    resultado_parte_b: { min: 1, max: 24 },
                    resultado_parte_ba: { min: -24, max: 0 },
                };
            }
            if (reportName === 'TAC 2') {
                return {
                    pontuacao_primeira_parte: { min: 0, max: 50 },
                    pontuacao_segunda_parte: { min: 0, max: 7 },
                    pontuacao_terceira_parte: { min: 0, max: 52 },
                };
            }
            return null;
        }

        function isWithinRange(value, min, max) {
            if (value === '' || value === null || value === undefined) return false;
            const numeric = Number(value);
            if (Number.isNaN(numeric)) return false;
            return numeric >= min && numeric <= max;
        }

        function clearFieldError(fieldWrapper) {
            fieldWrapper.classList.remove('field-error');
            const message = fieldWrapper.querySelector('.field-error-message');
            if (message) message.remove();
        }

        function setFieldError(fieldWrapper) {
            if (!fieldWrapper.classList.contains('field-error')) {
                fieldWrapper.classList.add('field-error');
            }
            if (!fieldWrapper.querySelector('.field-error-message')) {
                const message = document.createElement('small');
                message.className = 'field-error-message';
                message.textContent = 'Valor inserido fora dos limites. Por favor escolha um valor válido';
                message.style.color = '#dc2626';
                message.style.display = 'block';
                message.style.marginTop = '6px';
                message.style.fontSize = '12px';
                fieldWrapper.appendChild(message);
            }
        }

        function clearReportFieldErrors() {
            document.querySelectorAll('#report-input-container .form-row').forEach(clearFieldError);
        }

        let reportSubmitAttempted = false;

        function validateReportInputs(reportName) {
            const rules = getReportInputRules(reportName);
            if (!rules) return true;

            let valid = true;
            clearReportFieldErrors();

            Object.entries(rules).forEach(([fieldName, range]) => {
                const input = document.getElementById(fieldName);
                const fieldWrapper = input ? input.closest('.form-row') : null;
                const hasValue = input && input.value !== '';
                const fieldValid = input && isWithinRange(input.value, range.min, range.max);
                if (reportSubmitAttempted && hasValue && !fieldValid && fieldWrapper) {
                    setFieldError(fieldWrapper);
                    valid = false;
                } else if (fieldWrapper) {
                    clearFieldError(fieldWrapper);
                }
            });

            return valid;
        }

        function buildPrintPreviewShell(reportHtml) {
            return `
                <!DOCTYPE html>
                <html lang="pt-BR">
                <head>
                    <meta charset="UTF-8" />
                    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
                    <style>
                        @page { size: A4; margin: 18mm; }
                        body { margin: 0; background: #e5e7eb; font-family: Arial, Helvetica, sans-serif; }
                        .page {
                            max-width: 210mm;
                            min-height: 297mm;
                            margin: 0 auto;
                            background: #fff;
                            box-sizing: border-box;
                            padding: 22mm 18mm;
                            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.14);
                        }
                    </style>
                </head>
                <body>
                    <div class="page">${reportHtml}</div>
                </body>
                </html>
            `;
        }

        function renderHtmlReport(reportHtml) {
            const container = document.getElementById('report-results-container');
            container.innerHTML = '';
            const panel = document.createElement('section');
            panel.className = 'section';
            panel.style.marginTop = '16px';

            const card = document.createElement('div');
            card.className = 'form-card';

            const heading = document.createElement('h2');
            heading.textContent = 'Previa do relatorio';
            card.appendChild(heading);

            const iframe = document.createElement('iframe');
            iframe.title = 'Previa do relatorio';
            iframe.style.width = '100%';
            iframe.style.minHeight = '900px';
            iframe.style.border = '1px solid #cbd5e1';
            iframe.style.borderRadius = '12px';
            iframe.style.background = '#fff';
            iframe.srcdoc = buildPrintPreviewShell(reportHtml);
            card.appendChild(iframe);

            panel.appendChild(card);
            container.appendChild(panel);
        }

        async function loadReportFields(reportName) {
            const fieldsContainer = document.getElementById('report-input-container');
            fieldsContainer.innerHTML = '';
            clearReportContainers();
            if (!reportName) {
                return;
            }
            reportSubmitAttempted = false;

            try {
                const res = await fetch(`/api/report-fields?report_name=${encodeURIComponent(reportName)}`);
                if (!res.ok) throw new Error('failed');
                const fields = await res.json();
                if (!Array.isArray(fields) || fields.length === 0) {
                    return;
                }

                const panel = document.createElement('section');
                panel.className = 'section';
                panel.style.marginTop = '16px';

                const card = document.createElement('div');
                card.className = 'form-card';

                const heading = document.createElement('h2');
                heading.textContent = reportName;
                card.appendChild(heading);

                fields.forEach(field => {
                    const fieldWrapper = document.createElement('div');
                    fieldWrapper.className = 'form-row';

                    const label = document.createElement('label');
                    label.htmlFor = field.name;
                    label.textContent = field.label;
                    fieldWrapper.appendChild(label);

                    const input = document.createElement('input');
                    input.type = field.type || 'text';
                    input.id = field.name;
                    input.name = field.name;
                    input.placeholder = field.placeholder || '';
                    if (field.required) input.required = true;
                    if (field.min !== undefined) input.min = field.min;
                    if (field.max !== undefined) input.max = field.max;
                    input.addEventListener('input', () => {
                        if (reportSubmitAttempted) validateReportInputs(reportName);
                    });
                    input.addEventListener('change', () => {
                        if (reportSubmitAttempted) validateReportInputs(reportName);
                    });
                    fieldWrapper.appendChild(input);

                    card.appendChild(fieldWrapper);
                });

                const actionButton = document.createElement('button');
                actionButton.className = 'button';
                actionButton.type = 'button';
                actionButton.id = 'submit-report-btn';
                actionButton.textContent = 'Gerar relatório';
                actionButton.addEventListener('click', async () => {
                    await submitReport();
                });
                card.appendChild(actionButton);

                panel.appendChild(card);
                fieldsContainer.appendChild(panel);
            } catch (e) {
                console.error(e);
            }
        }

        function updateGenerateButtonState() {
            const patientSelect = document.getElementById('report-patient');
            const reportSelect = document.getElementById('report-type');
            const button = document.getElementById('generate-btn');
            button.disabled = !patientSelect.value || !reportSelect.value;
        }

        document.getElementById('report-patient').addEventListener('change', updateGenerateButtonState);
        document.getElementById('report-type').addEventListener('change', () => {
            updateGenerateButtonState();
        });

        document.getElementById('generate-btn').addEventListener('click', async () => {
            const reportName = document.getElementById('report-type').value;
            await loadReportFields(reportName);
        });

        async function submitReport() {
            const patientId = document.getElementById('report-patient').value;
            const reportName = document.getElementById('report-type').value;
            const inputs = {};
            document.querySelectorAll('#report-input-container input').forEach(inp => {
                if (inp.name) inputs[inp.name] = inp.type === 'number' ? (inp.value === '' ? null : Number(inp.value)) : inp.value;
            });
            reportSubmitAttempted = true;
            if (!validateReportInputs(reportName)) return;
            clearReportContainers();
            try {
                const res = await fetch('/api/reports', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ patient_id: patientId, report_name: reportName, input_data: inputs }),
                });
                const contentType = res.headers.get('content-type') || '';
                if (!res.ok) {
                    const errorText = contentType.includes('application/json')
                        ? ((await res.json()).detail || 'Erro ao gerar relatório')
                        : (await res.text()) || 'Erro ao gerar relatório';
                    throw new Error(errorText);
                }

                if (contentType.includes('text/html')) {
                    renderHtmlReport(await res.text());
                } else {
                    const data = await res.json();
                    if (data.report_results) {
                        loadReportResults(reportName, data.report_results);
                    } else {
                        loadReportInterface(reportName);
                    }
                }
            } catch (error) {
                alert(error.message || 'Erro ao gerar relatório');
                console.error(error);
            }
        }

        function getMetricBadgeClass(category) {
            switch (category) {
                case 'Muito Baixa':
                    return 'metric-badge-muito-baixa';
                case 'Baixa':
                    return 'metric-badge-baixa';
                case 'Média':
                    return 'metric-badge-media';
                case 'Alta':
                    return 'metric-badge-alta';
                case 'Muito Alta':
                    return 'metric-badge-muito-alta';
                default:
                    return 'metric-badge-media';
            }
        }

        function loadReportInterface(reportName) {
            const container = document.getElementById('report-results-container');
            container.innerHTML = `
                <section class="section" style="margin-top: 16px;">
                    <div class="form-card">
                        <h2>${reportName}</h2>
                        <div class="form-row">
                            <label>Entrada TAC 2</label>
                            <input id="tac2_input" type="text" placeholder="Digite um valor para TAC 2" />
                        </div>
                        <p>Para TAC 2, por enquanto nenhuma ação será feita com este valor.</p>
                    </div>
                </section>
            `;
        }

        function loadReportResults(reportName, results) {
            const container = document.getElementById('report-results-container');
            container.innerHTML = `
                <section class="section" style="margin-top: 16px;">
                    <div class="form-card">
                        <h2>${reportName} - Resultados</h2>
                        <div class="form-row"><label>Idade</label><div>${results.idade_paciente_tac2 || 'N/A'}</div></div>
                        <div class="form-row"><label>Pontuação Primeira parte:</label><div class="metric-value-row">${results.pontuacao_primeira_parte_mapeada ?? 'N/A'} <span class="metric-badge ${getMetricBadgeClass(results.pontuacao_primeira_parte_categoria)}">${results.pontuacao_primeira_parte_categoria || ''}</span></div></div>
                        <div class="form-row"><label>Pontuação Segunda parte:</label><div class="metric-value-row">${results.pontuacao_segunda_parte_mapeada ?? 'N/A'} <span class="metric-badge ${getMetricBadgeClass(results.pontuacao_segunda_parte_categoria)}">${results.pontuacao_segunda_parte_categoria || ''}</span></div></div>
                        <div class="form-row"><label>Pontuação Terceira parte:</label><div class="metric-value-row">${results.pontuacao_terceira_parte_mapeada ?? 'N/A'} <span class="metric-badge ${getMetricBadgeClass(results.pontuacao_terceira_parte_categoria)}">${results.pontuacao_terceira_parte_categoria || ''}</span></div></div>
                        <div class="form-row"><label>Pontuação Geral</label><div class="metric-value-row">${results.score_total_mapeado ?? 'N/A'} <span class="metric-badge ${getMetricBadgeClass(results.score_total_categoria)}">${results.score_total_categoria || ''}</span></div></div>
                    </div>
                </section>
            `;
        }

        const userMenu = document.getElementById('user-menu');
        const userMenuToggle = document.getElementById('user-menu-toggle');
        if (userMenu && userMenuToggle) {
            userMenuToggle.addEventListener('click', (event) => {
                event.stopPropagation();
                userMenu.classList.toggle('open');
                userMenuToggle.setAttribute('aria-expanded', String(userMenu.classList.contains('open')));
            });

            document.addEventListener('click', () => {
                userMenu.classList.remove('open');
                userMenuToggle.setAttribute('aria-expanded', 'false');
            });
        }

        loadPatients();
        loadReportTypes();
    </script>
</body>
</html>
