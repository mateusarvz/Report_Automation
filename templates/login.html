<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Report Psicologia</title>
    <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
    <div class="page-center">
        <div class="card">
            <img class="login-logo" src="/static/assets/logos/Logo_CogniReport_1.png" alt="Logo CogniReports" />
            <form method="post" action="/login" class="form-card">
                <div class="form-row">
                    <label for="email">E-mail</label>
                    <input id="email" name="email" type="email" placeholder="seu@email.com" required />
                </div>
                <div class="form-row">
                    <label for="password">Senha</label>
                    <input id="password" name="password" type="password" placeholder="Sua senha" required />
                </div>
                {% if error %}
                <p class="form-message" style="color: #dc2626;">{{ error }}</p>
                {% endif %}
                <button class="button" type="submit">Entrar</button>
            </form>
        </div>
    </div>
</body>
</html>
