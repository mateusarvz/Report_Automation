<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dados da Conta - Report Psicologia</title>
    <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar">
            <div class="brand">Report Psicologia</div>
            <nav>
                <a href="/generate-report" class="{{ 'active' if current_path == '/generate-report' else '' }}">Gerar Relatório</a>
                <a href="/register-patient" class="{{ 'active' if current_path == '/register-patient' else '' }}">Cadastrar Paciente</a>
                <a href="/account" class="{{ 'active' if current_path == '/account' else '' }}">Dados da conta</a>
                <a href="/patients" class="{{ 'active' if current_path == '/patients' else '' }}">Dados dos Pacientes</a>
            </nav>
        </aside>
        <main class="content">
            <header class="topbar">
                <div>Dados da Conta</div>
                <a class="logout" href="/logout">Sair</a>
            </header>

            <section class="section">
                <h2>Perfil</h2>
                <div class="card-grid">
                    <div class="card-item">
                        <strong>E-mail</strong>
                        <p>{{ user.email }}</p>
                    </div>
                    <div class="card-item">
                        <strong>Nome</strong>
                        <p>{{ user.full_name or '-' }}</p>
                    </div>
                    <div class="card-item">
                        <strong>Avatar</strong>
                        <p>
                            {% if user.picture %}
                                <img class="avatar" src="{{ user.picture }}" alt="Avatar" />
                            {% else %}
                                Não disponível
                            {% endif %}
                        </p>
                    </div>
                </div>
            </section>
        </main>
    </div>
</body>
</html>
